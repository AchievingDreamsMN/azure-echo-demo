# CI/CD Pipeline for Azure Container Apps
# Deploys to QA on develop branch, Prod on main branch with approval

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'qa'
        type: choice
        options:
          - qa
          - prod

env:
  IMAGE_NAME: echo-server
  TERRAFORM_VERSION: 1.6.6
  KEY_VAULT_NAME: demo-echo-server-kv
  ARTIFACTS_CONTAINER: test-reports

jobs:
  # Job 1: Run tests and lint
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install -r tests/requirements-test.txt
          pip install bandit pip-audit

      - name: Security scan with Bandit (Python SAST)
        run: |
          bandit -r app/ -f json -o bandit-results.json || true
          bandit -r app/ -f txt || true
        continue-on-error: true

      - name: Dependency vulnerability scan with pip-audit
        run: |
          pip-audit -r app/requirements.txt --format json --output pip-audit-results.json || true
          pip-audit -r app/requirements.txt || true
        continue-on-error: true

      - name: Lint with Ruff
        run: ruff check app/ --output-format=json > lint-results.json || true
        continue-on-error: true

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --junitxml=test-results.xml \
            --cov=app \
            --cov-report=html:coverage-report \
            --cov-report=xml:coverage.xml

      - name: Upload test artifacts to GitHub
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-${{ github.sha }}
          path: |
            test-results.xml
            coverage.xml
            coverage-report/
            lint-results.json
            bandit-results.json
            pip-audit-results.json
          retention-days: 30

      - name: Security scan summary
        if: always()
        run: |
          echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Bandit results
          if [ -f bandit-results.json ]; then
            BANDIT_ISSUES=$(cat bandit-results.json | jq '.results | length' 2>/dev/null || echo "0")
            if [ "$BANDIT_ISSUES" = "0" ]; then
              echo "### Bandit (Python SAST): No issues found" >> $GITHUB_STEP_SUMMARY
            else
              echo "### Bandit (Python SAST): $BANDIT_ISSUES issue(s) found" >> $GITHUB_STEP_SUMMARY
            fi
          fi
          
          # pip-audit results
          if [ -f pip-audit-results.json ]; then
            VULN_COUNT=$(cat pip-audit-results.json | jq '.dependencies | map(select(.vulns | length > 0)) | length' 2>/dev/null || echo "0")
            if [ "$VULN_COUNT" = "0" ]; then
              echo "### pip-audit (Dependencies): No vulnerabilities found" >> $GITHUB_STEP_SUMMARY
            else
              echo "### pip-audit (Dependencies): $VULN_COUNT vulnerable package(s)" >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Log in to Azure
        if: github.event_name == 'push'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Upload artifacts to Azure Blob Storage
        if: github.event_name == 'push'
        continue-on-error: true
        run: |
          STORAGE_ACCOUNT=$(az keyvault secret show --vault-name ${{ env.KEY_VAULT_NAME }} --name artifacts-storage-account-name --query value -o tsv 2>/dev/null || echo "")
          if [ -n "$STORAGE_ACCOUNT" ]; then
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            BLOB_PATH="${{ github.ref_name }}/$TIMESTAMP-${{ github.sha }}"
            
            # Upload test results
            az storage blob upload-batch \
              --account-name $STORAGE_ACCOUNT \
              --destination ${{ env.ARTIFACTS_CONTAINER }} \
              --source . \
              --pattern "*.xml" \
              --destination-path "$BLOB_PATH" \
              --auth-mode login
            
            # Upload coverage report
            az storage blob upload-batch \
              --account-name $STORAGE_ACCOUNT \
              --destination ${{ env.ARTIFACTS_CONTAINER }} \
              --source coverage-report \
              --destination-path "$BLOB_PATH/coverage-report" \
              --auth-mode login
            
            echo "## Test Artifacts Uploaded" >> $GITHUB_STEP_SUMMARY
            echo "Storage: $STORAGE_ACCOUNT/${{ env.ARTIFACTS_CONTAINER }}/$BLOB_PATH" >> $GITHUB_STEP_SUMMARY
          else
            echo "Artifacts storage not configured yet - skipping upload"
          fi

  # Job 2: Build and push Docker image
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get secrets from Key Vault
        id: keyvault
        run: |
          ACR_SERVER=$(az keyvault secret show --vault-name ${{ env.KEY_VAULT_NAME }} --name acr-login-server --query value -o tsv)
          ACR_USERNAME=$(az keyvault secret show --vault-name ${{ env.KEY_VAULT_NAME }} --name acr-username --query value -o tsv)
          ACR_PASSWORD=$(az keyvault secret show --vault-name ${{ env.KEY_VAULT_NAME }} --name acr-password --query value -o tsv)
          echo "::add-mask::$ACR_PASSWORD"
          echo "acr_server=$ACR_SERVER" >> $GITHUB_OUTPUT
          echo "acr_username=$ACR_USERNAME" >> $GITHUB_OUTPUT
          echo "acr_password=$ACR_PASSWORD" >> $GITHUB_OUTPUT

      - name: Log in to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ steps.keyvault.outputs.acr_server }}
          username: ${{ steps.keyvault.outputs.acr_username }}
          password: ${{ steps.keyvault.outputs.acr_password }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.keyvault.outputs.acr_server }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build Docker image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:scan

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Run Trivy and save results
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan
          format: 'sarif'
          output: 'trivy-results.sarif'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-${{ github.sha }}
          path: trivy-results.sarif
          retention-days: 30

      - name: Container scan summary
        run: |
          echo "## Container Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "Trivy scanned image for OS and library vulnerabilities" >> $GITHUB_STEP_SUMMARY
          echo "See artifacts for detailed SARIF report" >> $GITHUB_STEP_SUMMARY

      - name: Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Job 3: Deploy to QA (on develop branch)
  deploy-qa:
    name: Deploy to QA
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: qa
    
    defaults:
      run:
        working-directory: terraform/environments/qa

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get secrets from Key Vault
        id: keyvault
        run: |
          ACR_SERVER=$(az keyvault secret show --vault-name ${{ env.KEY_VAULT_NAME }} --name acr-login-server --query value -o tsv)
          ACR_USERNAME=$(az keyvault secret show --vault-name ${{ env.KEY_VAULT_NAME }} --name acr-username --query value -o tsv)
          ACR_PASSWORD=$(az keyvault secret show --vault-name ${{ env.KEY_VAULT_NAME }} --name acr-password --query value -o tsv)
          echo "::add-mask::$ACR_PASSWORD"
          echo "acr_server=$ACR_SERVER" >> $GITHUB_OUTPUT
          echo "acr_username=$ACR_USERNAME" >> $GITHUB_OUTPUT
          echo "acr_password=$ACR_PASSWORD" >> $GITHUB_OUTPUT

      - name: Terraform Init
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="image_tag=${{ needs.build.outputs.image_tag }}" \
            -var="container_registry_server=${{ steps.keyvault.outputs.acr_server }}" \
            -var="container_registry_username=${{ steps.keyvault.outputs.acr_username }}" \
            -var="container_registry_password=${{ steps.keyvault.outputs.acr_password }}" \
            -out=tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

      - name: Get QA App URL
        run: |
          APP_URL=$(terraform output -raw container_app_url)
          echo "## 🧪 QA Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "Application URL: $APP_URL" >> $GITHUB_STEP_SUMMARY

  # Job 4: Deploy to Production (manual trigger only)
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    environment: production  # Requires manual approval in GitHub settings
    
    defaults:
      run:
        working-directory: terraform/environments/prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="image_tag=${{ needs.build.outputs.image_tag }}" \
            -out=tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

      - name: Get Production App URL
        run: |
          APP_URL=$(terraform output -raw container_app_url)
          echo "## 🚀 Production Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "Application URL: $APP_URL" >> $GITHUB_STEP_SUMMARY
